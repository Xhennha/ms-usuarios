# Puerto en el que corre este microservicio.
# Render (y otros servicios en la nube) asignan el puerto dinamicamente via
# la variable de entorno PORT; localmente, si no existe esa variable, usa 8081.
server.port=${PORT:8081}

# --- Conexion a la base de datos (Supabase / Postgres, via Session Pooler - IPv4) ---
# Los valores reales NO van escritos aqui (este archivo se sube a GitHub).
# Se leen desde variables de entorno: DB_URL, DB_USERNAME, DB_PASSWORD.
# - En IntelliJ (local): Run -> Edit Configurations -> Environment variables.
# - En Render (produccion): Dashboard del servicio -> Environment.
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres.hyneitobgofpyfyswygj}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Configuracion de JPA / Hibernate ---
# "update": si la tabla no existe, Hibernate la crea sola a partir de las clases @Entity.
# Util para un proyecto academico, en un proyecto real se usarian migraciones (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Nombre de la aplicacion (aparece en los logs al iniciar)
spring.application.name=ms-usuarios

# --- CORS: que paginas web pueden llamar a esta API ---
# Lista separada por comas. Se puede sobreescribir con la variable de entorno
# CORS_ALLOWED_ORIGINS (por ejemplo, para agregar la URL de Vercel en produccion).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
